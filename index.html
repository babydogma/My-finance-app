<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Finance App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">

    <!-- HEADER -->
    <header class="header header--simple">
      <div class="header-center header-center--single">
        <div class="header-switch">
          <button class="header-switch__item is-active" type="button" id="period7Btn">7 дней</button>
          <button class="header-switch__item" type="button" id="period30Btn">30 дней</button>
        </div>
      </div>
    </header>

    <!-- MAIN VIEW -->
    <div id="mainView">

      <!-- BALANCE -->
      <section class="balance">
        <p class="balance-label">Баланс</p>
        <h1 class="balance-amount">0 ₽</h1>

        <div class="balance-meta balance-meta--single">
          <div class="balance-result" id="balanceResultValue">0 ₽</div>
          <div class="balance-period-toggle" id="balancePeriodLabel">за 7 дней</div>
        </div>
      </section>

      <!-- ACTIONS -->
      <section class="actions">
        <button class="action-card" type="button" id="openExpenseModal">
          <div class="action-icon">−</div>
          <div class="action-label">Расход</div>
        </button>

        <button class="action-card" type="button" id="openIncomeModal">
          <div class="action-icon">+</div>
          <div class="action-label">Доход</div>
        </button>

        <button class="action-card" type="button" id="openTransferModal">
          <div class="action-icon">↗</div>
          <div class="action-label">Перевод</div>
        </button>

        <button class="action-card" type="button" id="openCategoriesManagerBtn">
          <div class="action-icon">⇄</div>
          <div class="action-label">Категории</div>
        </button>
      </section>

      <!-- ACCOUNTS -->
      <section class="section">
        <div class="section-head">
          <h2 class="section-title">Счета</h2>
          <div class="section-note" id="accountsTotal">Всего: 0 ₽</div>
        </div>

        <div class="list" id="accountsList"></div>
      </section>

      <!-- CATEGORIES -->
      <section class="section">
        <div class="section-head">
          <h2 class="section-title">Категории</h2>
          <div class="section-note">Этот месяц</div>
        </div>

        <div class="list" id="categoriesList"></div>
      </section>

      <!-- TRANSACTIONS -->
      <section class="section">
        <div class="section-head">
          <h2 class="section-title">Последние операции</h2>
          <div class="section-note">5 последних</div>
        </div>

        <div class="list" id="transactionsList"></div>
      </section>

    </div>

    <!-- CATEGORIES MANAGER VIEW -->
    <div id="categoriesManagerView" class="hidden">
      <section class="section section--manager-top">
        <div class="section-head">
          <button class="manager-back-btn" type="button" id="closeCategoriesManagerBtn">← Назад</button>
          <h2 class="section-title">Категории расходов</h2>
          <div class="section-note">Управление</div>
        </div>

        <div class="manager-card">
          <div class="field">
            <input class="input" id="newCategoryNameInput" type="text" placeholder="Название категории" />
          </div>

          <div class="field">
            <input class="input" id="newCategoryIconInput" type="text" placeholder="Эмодзи, например 🍔" maxlength="4" />
          </div>

          <button class="btn btn-primary manager-add-btn" type="button" id="addCategoryBtn">
            Добавить категорию
          </button>
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2 class="section-title">Список категорий</h2>
          <div class="section-note">Можно менять</div>
        </div>

        <div class="list" id="categoriesManagerList"></div>
      </section>
    </div>

    <!-- HISTORY VIEW -->
      <div class="history-filters">
  <div class="history-filter-group history-filter-group--primary">
    <button
      class="history-filter-btn history-filter-btn--month is-active"
      type="button"
      data-period="month"
      id="historyMonthBtn"
    >
      Месяц
    </button>
  </div>

  <div class="history-filter-group history-filter-group--secondary">
    <button class="history-filter-btn" type="button" data-period="today">Сегодня</button>
    <button class="history-filter-btn" type="button" data-period="7">7 дней</button>
    <button class="history-filter-btn" type="button" data-period="range" id="historyRangeBtn">Период</button>
  </div>

  <div class="history-filter-group history-filter-group--inputs">
    <input class="input hidden" type="month" id="historyMonthInput" />
    <input class="input hidden" type="date" id="historyRangeFromInput" />
    <input class="input hidden" type="date" id="historyRangeToInput" />
    <div class="section-note hidden" id="historySelectedPeriodLabel"></div>
  </div>

  <div class="history-filter-group">
    <button class="history-filter-btn is-active" type="button" data-type="all">Все</button>
    <button class="history-filter-btn" type="button" data-type="income">Доходы</button>
    <button class="history-filter-btn" type="button" data-type="expense">Расходы</button>
    <button class="history-filter-btn" type="button" data-type="transfer">Переводы</button>
  </div>
</div>
      </section>

      <section class="section">
        <div class="list" id="historyTransactionsList"></div>
      </section>
    </div>

    <!-- ANALYTICS VIEW -->
<section class="section section--manager-top">
  <div class="history-filters">
    <div class="history-filter-group history-filter-group--primary">
      <button
        class="history-filter-btn history-filter-btn--month is-active"
        type="button"
        data-analytics-period="month"
        id="analyticsMonthBtn"
      >
        Месяц
      </button>
    </div>

    <div class="history-filter-group history-filter-group--secondary">
      <button class="history-filter-btn" type="button" data-analytics-period="today">Сегодня</button>
      <button class="history-filter-btn" type="button" data-analytics-period="7">7 дней</button>
      <button class="history-filter-btn" type="button" data-analytics-period="range" id="analyticsRangeBtn">Период</button>
    </div>

    <div class="history-filter-group history-filter-group--inputs">
      <input class="input hidden" type="month" id="analyticsMonthInput" />
      <input class="input hidden" type="date" id="analyticsRangeFromInput" />
      <input class="input hidden" type="date" id="analyticsRangeToInput" />
      <div class="section-note hidden" id="analyticsSelectedPeriodLabel"></div>
    </div>
  </div>
</section>

  <section class="section">
    <div class="summary">
      <div class="summary-card">
        <p class="summary-label">Доходы за период</p>
        <p class="summary-value" id="analyticsIncomeValue">0 ₽</p>
      </div>

      <div class="summary-card">
        <p class="summary-label">Расходы за период</p>
        <p class="summary-value" id="analyticsExpenseValue">0 ₽</p>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="manager-card analytics-total-card">
      <p class="summary-label">Итог за период</p>
      <p class="summary-value" id="analyticsNetValue">0 ₽</p>
    </div>
  </section>

  <section class="section">
  <div class="manager-card analytics-chart-card analytics-chart-card--clean">
    <div class="analytics-overview" id="analyticsDonut"></div>
    <div class="analytics-breakdown" id="analyticsLegend"></div>
  </div>
</section>
</div>

    <!-- BUDGET VIEW -->
<div id="budgetView" class="hidden">
  <section class="section section--manager-top">
    <div class="section-head section-head--budget">
      <div></div>
      <div class="section-note" id="budgetCountLabel">0 категорий</div>
    </div>
  </section>

  <section class="section">
    <div class="list" id="budgetList"></div>
  </section>
</div>

  </main>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav-wrap">
    <nav class="bottom-nav">
      <button class="nav-item is-active" type="button" id="navWalletBtn">
        <div class="nav-icon">👛</div>
        <div class="nav-label">Кошелёк</div>
      </button>

      <button class="nav-item" type="button" id="navAnalyticsBtn">
        <div class="nav-icon">📈</div>
        <div class="nav-label">Аналитика</div>
      </button>

      <button class="nav-item" type="button" id="navBudgetBtn">
        <div class="nav-icon">%</div>
        <div class="nav-label">Бюджет</div>
      </button>

      <button class="nav-item" type="button" id="navHistoryBtn">
        <div class="nav-icon">🕘</div>
        <div class="nav-label">История</div>
      </button>
    </nav>
  </div>

  <!-- TRANSACTION MODAL -->
<div class="modal hidden" id="transactionModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3 class="modal-title">Добавить операцию</h3>

    <div class="field">
  <input class="input" id="amountInput" type="number" placeholder="Сумма" />
</div>

<div class="field">
  <input class="input" id="dateInput" type="date" />
</div>

    <div class="field" id="categoryField">
      <select class="select" id="categorySelect">
        <option>Выбери категорию</option>
      </select>
    </div>

    <div class="field" id="accountField">
      <select class="select" id="accountSelect">
        <option>Выбери счёт</option>
        <option>Яндекс Банк</option>
        <option>Наличные</option>
        <option>Сейфы Яндекса</option>
        <option>Наличный резерв</option>
      </select>
    </div>

    <div class="field hidden" id="fromAccountField">
      <select class="select" id="fromAccountSelect">
        <option>С какого счёта</option>
        <option>Яндекс Банк</option>
        <option>Наличные</option>
        <option>Сейфы Яндекса</option>
        <option>Наличный резерв</option>
      </select>
    </div>

    <div class="field hidden" id="toAccountField">
      <select class="select" id="toAccountSelect">
        <option>На какой счёт</option>
        <option>Яндекс Банк</option>
        <option>Наличные</option>
        <option>Сейфы Яндекса</option>
        <option>Наличный резерв</option>
      </select>
    </div>

    <div class="field">
      <input class="input" id="commentInput" type="text" placeholder="Комментарий" />
    </div>

    <div class="modal-actions modal-actions--triple">
      <button class="btn btn-danger hidden" type="button" id="deleteTransactionBtn">Удалить</button>
      <button class="btn btn-secondary" type="button" id="closeModalBtn">Отмена</button>
      <button class="btn btn-primary" type="button" id="saveTransactionBtn">Сохранить</button>
    </div>
  </div>
</div>

  <!-- BUDGET MODAL -->
  <div class="modal hidden" id="budgetModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h3 class="modal-title" id="budgetModalTitle">Лимит категории</h3>

      <div class="field">
        <input class="input" id="budgetAmountInput" type="number" placeholder="Лимит на месяц" />
      </div>

      <div class="modal-actions modal-actions--triple">
        <button class="btn btn-danger hidden" type="button" id="deleteBudgetBtn">Удалить</button>
        <button class="btn btn-secondary" type="button" id="closeBudgetModalBtn">Отмена</button>
        <button class="btn btn-primary" type="button" id="saveBudgetBtn">Сохранить</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
</body>
</html>
