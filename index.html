<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Finance App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="header-avatar">Н</div>

      <div class="header-center">
        <div class="header-switch">
          <button class="header-switch__item is-active" type="button">Финансы</button>
          <button class="header-switch__item" type="button">Бюджет</button>
        </div>
      </div>

      <button class="header-icon-btn" type="button" aria-label="Сканировать">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M8 4H6a2 2 0 0 0-2 2v2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M16 4h2a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M8 20H6a2 2 0 0 1-2-2v-2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M16 20h2a2 2 0 0 0 2-2v-2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M8 12h8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <!-- BALANCE -->
    <section class="balance">
      <p class="balance-label">Баланс</p>
      <h1 class="balance-amount">78 450 ₽</h1>

      <div class="balance-meta">
        <div class="balance-profit">+2 300 ₽</div>
        <div class="balance-loss">↓ 12,4%</div>
        <div class="balance-period">за месяц</div>
      </div>
    </section>

    <!-- ACTIONS -->
    <section class="actions">
      <button class="action-card" type="button" id="openExpenseModal">
        <div class="action-icon">−</div>
        <div class="action-label">Расход</div>
      </button>

      <button class="action-card" type="button" id="openIncomeModal">
        <div class="action-icon">+</div>
        <div class="action-label">Доход</div>
      </button>

      <button class="action-card" type="button" id="openTransferModal">
        <div class="action-icon">↗</div>
        <div class="action-label">Перевод</div>
      </button>

      <button class="action-card" type="button">
        <div class="action-icon">⇄</div>
        <div class="action-label">Категории</div>
      </button>
    </section>

    <!-- QUICK SUMMARY -->
    <section class="section">
  <div class="summary">
    <div class="summary-card">
      <p class="summary-label">Расходы за месяц</p>
      <p class="summary-value" id="monthlyExpenseValue">0 ₽</p>
    </div>

    <div class="summary-card">
      <p class="summary-label">Доходы за месяц</p>
      <p class="summary-value" id="monthlyIncomeValue">0 ₽</p>
    </div>
  </div>
</section>

    <!-- ACCOUNTS -->
<section class="section">
  <div class="section-head">
    <h2 class="section-title">Счета</h2>
    <div class="section-note" id="accountsTotal">Всего: 0 ₽</div>
  </div>

  <div class="list" id="accountsList"></div>
</section>

<!-- CATEGORIES -->
<section class="section">
  <div class="section-head">
    <h2 class="section-title">Категории</h2>
    <div class="section-note">Этот месяц</div>
  </div>

  <div class="list" id="categoriesList"></div>
</section>

<!-- TRANSACTIONS -->
<section class="section">
  <div class="section-head">
    <h2 class="section-title">Последние операции</h2>
    <div class="section-note">Сегодня</div>
  </div>

  <div class="list" id="transactionsList"></div>
</section>

  </main>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav-wrap">
    <nav class="bottom-nav">
      <button class="nav-item is-active" type="button">
        <div class="nav-icon">👛</div>
        <div class="nav-label">Кошелёк</div>
      </button>

      <button class="nav-item" type="button">
        <div class="nav-icon">📈</div>
        <div class="nav-label">Аналитика</div>
      </button>

      <button class="nav-item" type="button">
        <div class="nav-icon">%</div>
        <div class="nav-label">Бюджет</div>
      </button>

      <button class="nav-item" type="button">
        <div class="nav-icon">🕘</div>
        <div class="nav-label">История</div>
      </button>
    </nav>
  </div>

  <!-- MODAL -->
  <div class="modal hidden" id="transactionModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h3 class="modal-title">Добавить операцию</h3>

      <div class="field">
        <input class="input" type="number" placeholder="Сумма" />
      </div>

      <div class="field">
        <select class="select">
          <option>Выбери категорию</option>
          <option>Еда</option>
          <option>Транспорт</option>
          <option>Развлечения</option>
          <option>Зарплата</option>
        </select>
      </div>

      <div class="field">
        <select class="select">
          <option>Выбери счёт</option>
          <option>Яндекс Банк</option>
          <option>Наличные</option>
          <option>Сейф</option>
        </select>
      </div>

      <div class="field">
        <input class="input" type="text" placeholder="Комментарий" />
      </div>

      <div class="modal-actions">
        <button class="btn btn-secondary" type="button" id="closeModalBtn">Отмена</button>
        <button class="btn btn-primary" type="button">Сохранить</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
